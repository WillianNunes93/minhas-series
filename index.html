<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Séries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><span class="emoji">📺</span> Minhas Séries</h1>
    <p>Organize suas séries favoritas por distribuidora</p>
  </header>

  <div id="tela-login" class="auth-wrap">
    <div class="auth-card">
      <h2 id="auth-titulo">Entrar</h2>

      <div class="campo">
        <label for="auth-email">E-mail</label>
        <input type="email" id="auth-email" placeholder="voce@email.com">
      </div>

      <div class="campo">
        <label for="auth-senha">Senha</label>
        <input type="password" id="auth-senha" placeholder="Mínimo 6 caracteres">
      </div>

      <p id="auth-erro" class="vazio aviso-inline" hidden></p>

      <button type="button" id="btn-auth-entrar">Entrar</button>
      <button type="button" id="btn-auth-cadastrar" class="btn-secundario">Criar conta</button>
    </div>
  </div>

  <div id="app-container" hidden>
    <div class="usuario-barra">
      <span id="usuario-email"></span>
      <a id="link-admin" href="admin.html" hidden>Painel admin</a>
      <button type="button" id="btn-sair">Sair</button>
    </div>

    <main>
      <nav class="tabs">
        <button type="button" class="tab-btn" data-tab="consultar">🔍 Consultar</button>
        <button type="button" class="tab-btn ativa" data-tab="lista">📋 Minha Lista</button>
      </nav>

      <section class="form-section painel-tab" id="painel-consultar" hidden>
        <h2>Consultar série</h2>

        <div class="campo">
          <label for="busca-nome">Nome da série</label>
          <div class="busca-linha">
            <input type="text" id="busca-nome" placeholder="Ex: Breaking Bad">
            <button type="button" id="btn-buscar">Buscar</button>
          </div>
        </div>

        <div id="resultados-busca" class="resultados-grid"></div>

        <form id="form-serie" class="form-confirmar" hidden>
          <div class="detalhe-serie">
            <img id="preview-backdrop" class="detalhe-backdrop" alt="" hidden>
            <div class="detalhe-corpo">
              <img id="preview-poster" class="detalhe-poster" alt="" hidden>
              <div class="detalhe-info">
                <strong id="preview-nome" class="detalhe-nome"></strong>
                <p id="preview-tagline" class="detalhe-tagline" hidden></p>
                <div class="detalhe-badges">
                  <span id="preview-cancelada" class="badge cancelada" hidden>Cancelada</span>
                  <span id="preview-nota-tmdb" class="badge nota-tmdb" hidden></span>
                  <span id="preview-temporadas" class="serie-meta" hidden></span>
                  <a id="preview-trailer" class="link-trailer" target="_blank" rel="noopener" hidden>▶ Trailer</a>
                </div>
                <div id="preview-generos" class="generos-tags"></div>
              </div>
            </div>
            <p id="preview-sinopse" class="detalhe-sinopse"></p>

            <div id="preview-recomendacoes-secao" class="recomendacoes-secao" hidden>
              <p class="recomendacoes-titulo">Você também pode gostar de</p>
              <div id="preview-recomendacoes" class="recomendacoes-grid"></div>
            </div>
          </div>

          <div class="campo">
            <label id="label-distribuidoras">Distribuidoras</label>
            <div id="preview-distribuidoras" class="distribuidoras-tags"></div>
            <p id="aviso-sem-distribuidora" class="vazio aviso-inline" hidden>Selecione pelo menos uma distribuidora.</p>
          </div>

          <div class="campo" id="campo-add-distribuidora">
            <label for="distribuidora-manual">Adicionar outra distribuidora</label>
            <div class="busca-linha">
              <select id="distribuidora-manual">
                <option value="Netflix">Netflix</option>
                <option value="Prime Video">Prime Video</option>
                <option value="Disney+">Disney+</option>
                <option value="Max">Max (HBO)</option>
                <option value="Apple TV+">Apple TV+</option>
                <option value="Paramount+">Paramount+</option>
                <option value="Globoplay">Globoplay</option>
                <option value="Star+">Star+</option>
                <option value="Outro">Outro</option>
              </select>
              <button type="button" id="btn-add-distribuidora">+ Adicionar</button>
            </div>
          </div>

          <div class="campo">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="quero-assistir">Quero assistir</option>
              <option value="assistindo">Assistindo</option>
              <option value="completa">Completa</option>
            </select>
          </div>

          <div class="campo">
            <label for="nota">Sua nota (0 a 10)</label>
            <input type="number" id="nota" min="0" max="10" step="0.5" placeholder="Opcional">
          </div>

          <button type="submit">Adicionar à lista</button>
        </form>
      </section>

      <section class="lista-section painel-tab" id="painel-lista">
        <div class="lista-header">
          <h2>Minha lista</h2>
          <div class="lista-controles">
            <input type="text" id="busca-lista" placeholder="Buscar na sua lista...">
            <select id="ordenar-lista">
              <option value="recentes">Recentes primeiro</option>
              <option value="nota">Maior nota</option>
              <option value="alfabetica">Alfabética (A-Z)</option>
            </select>
            <select id="filtro-distribuidora">
              <option value="todas">Todas as distribuidoras</option>
            </select>
          </div>
        </div>

        <div id="continuar-assistindo-secao" class="continuar-secao" hidden>
          <p class="continuar-titulo">▶️ Continuar assistindo</p>
          <div id="continuar-assistindo-grid" class="serie-grid"></div>
        </div>

        <div id="lista-series"></div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
</body>
</html>
